catalog_refs:
  by_variable:
    SUBJID:
      display_label: Index Case ID
      normalized_meaning: Pseudonymized Index Case identifier for the study participant.
      search_terms:
        - SUBJID
        - Index case ID number
        - subject id
        - participant id
      catalog_tier: dataset_backed
      analysis_queryable: true
    FID:
      display_label: Family ID
      normalized_meaning: Pseudonymized Family/Household identifier linking related participants.
      search_terms:
        - FID
        - Family ID
        - household id
      catalog_tier: dataset_backed
      analysis_queryable: true
    IS_VISDAT:
      display_label: Date of Screening
      normalized_meaning: Date the screening visit was conducted, jittered for PHI handling.
      search_terms:
        - IS_VISDAT
        - Date of Screening
        - screening date
      catalog_tier: dataset_backed
      analysis_queryable: true
    IS_PENRB:
      display_label: Previously Enrolled in Cohort B
      normalized_meaning: Whether the participant was previously enrolled in Cohort B (Yes/No).
      search_terms:
        - IS_PENRB
        - Cohort B
        - previously enrolled
      catalog_tier: dataset_backed
      analysis_queryable: true
    IS_PRIORBID:
      display_label: Household Contact ID
      normalized_meaning: Pseudonymized Household Contact identifier (prior Cohort B linkage).
      search_terms:
        - IS_PRIORBID
        - Household Contact ID
        - prior household ID
      catalog_tier: dataset_backed
      analysis_queryable: true
    IS_CONTACTS:
      display_label: Household Contacts Over 6 Years
      normalized_meaning: Number of other household members over 6 years of age living in the household in the last 3 months.
      search_terms:
        - IS_CONTACTS
        - household contacts
        - other people over 6 years
      catalog_tier: dataset_backed
      analysis_queryable: true
    IS_SEX:
      display_label: Gender at Birth
      normalized_meaning: Participant gender at birth (Male/Female).
      search_terms:
        - IS_SEX
        - Gender at birth
        - sex
      catalog_tier: dataset_backed
      analysis_queryable: true
    IS_MUNIC:
      display_label: Municipality
      normalized_meaning: Municipality of the participant (Puducherry, Villupuram, or Cuddalore).
      search_terms:
        - IS_MUNIC
        - Municipality
        - Puducherry
        - Villupuram
        - Cuddalore
      catalog_tier: source_only
      analysis_queryable: false
    IS_ICF:
      display_label: Informed Consent Obtained
      normalized_meaning: Whether informed consent has been obtained as per applicable regulations (Yes/No).
      search_terms:
        - IS_ICF
        - informed consent
        - consent obtained
      catalog_tier: dataset_backed
      analysis_queryable: true
    IS_ICFDT:
      display_label: Informed Consent Date
      normalized_meaning: Date informed consent was signed, jittered for PHI handling.
