catalog_refs:
  by_variable:
    SUBJID:
      display_label: Participant ID
      normalized_meaning: Pseudonymized identifier for the household-contact study participant.
      search_terms:
        - SUBJID
        - Household contact ID
        - participant id
        - subject id
      catalog_tier: dataset_backed
      analysis_queryable: true
    FID:
      display_label: Family ID
      normalized_meaning: Pseudonymized family/household identifier linking household contacts to an index case.
      search_terms:
        - FID
        - Family ID
        - household identifier
        - family identifier
      catalog_tier: dataset_backed
      analysis_queryable: true
    HHC_VISDAT:
      display_label: Date of Screening
      normalized_meaning: Date the household contact screening was performed (Day/Month/Year), jittered for PHI handling.
      search_terms:
        - HHC_VISDAT
        - Date of Screening
        - screening date
      catalog_tier: dataset_backed
      analysis_queryable: true
    HHC_SEX:
      display_label: Gender at Birth
      normalized_meaning: Gender at birth recorded for the household contact (Male/Female).
      search_terms:
        - HHC_SEX
        - SEX
        - Gender at birth
        - sex
        - gender
      catalog_tier: dataset_backed
      analysis_queryable: true
    HHC_BINCL01:
      display_label: 3-Month Cohabitation Criterion
      normalized_meaning: Inclusion indicator for the past-3-months household-contact cohabitation criteria (slept under same roof / shared meal / watched TV — multiple choices possible).
      search_terms:
        - HHC_BINCL01
        - BINCL01
        - past 3 months
        - cohabitation
        - inclusion criterion
      catalog_tier: dataset_backed
      analysis_queryable: true
    HHC_ICF:
      display_label: Informed Consent Signed
      normalized_meaning: Whether the household contact signed the Household Contact Consent form (Yes/No).
      search_terms:
        - HHC_ICF
        - ICF
        - Household Contact Consent
        - informed consent
      catalog_tier: dataset_backed
      analysis_queryable: true
    HHC_ICFDT:
      display_label: Consent Signed Date
      normalized_meaning: Date the household contact consent was signed (Day/Month/Year), jittered for PHI handling.
      search_terms:
        - HHC_ICFDT
        - date consent signed
        - consent date
      catalog_tier: dataset_backed
      analysis_queryable: true
    HHC_ICFV:
      display_label: Consent Version
      normalized_meaning: Consent form version indicator paired with HHC_ICF — review_required because no PDF visible text or annotation matched.
      search_terms:
        - HHC_ICFV
        - consent version
      catalog_tier: source_only
      analysis_queryable: false
    HHC_ICFREAS:
      display_label: Reason Consent Not Signed
      normalized_meaning: Free-text reason captured when consent was not signed ("If NO, specify reason:").
      search_terms:
        - HHC_ICFREAS
        - If NO, specify reason
        - reason consent not signed
      catalog_tier: dataset_backed
      analysis_queryable: false
    HHC_AGEY:
      display_label: Age 6 Years or Older
      normalized_meaning: Inclusion indicator — whether the household contact is 6 years of age or older (Yes/No).
      search_terms:
        - HHC_AGEY
        - 6 years of age or older
        - age 6 years
        - age threshold
      catalog_tier: dataset_backed
      analysis_queryable: true
    HHC_BRTHDAT:
      display_label: Date of Birth
      normalized_meaning: Date of birth of the household contact (Day/Month/Year, with 99 indicating unknown day/month), jittered for PHI handling.
      search_terms:
        - HHC_BRTHDAT
        - Date of Birth
        - DOB
        - birth date
      catalog_tier: dataset_backed
      analysis_queryable: true
    HHC_AGE:
      display_label: Age in Years
      normalized_meaning: Age in years recorded as an alternative to date of birth.
      search_terms:
        - HHC_AGE
        - Age
        - age in years
      catalog_tier: dataset_backed
      analysis_queryable: true
    HHC_AGEEST:
      display_label: Date or Age Estimated
      normalized_meaning: Tick indicator that the date of birth or age recorded is an estimate.
      search_terms:
        - HHC_AGEEST
        - estimate
        - age estimate
        - date estimate
      catalog_tier: dataset_backed
      analysis_queryable: true
    HHC_BEXCL01:
      display_label: Intends to Reside With Index Case
      normalized_meaning: Inclusion criterion — whether the candidate intends to reside with the Index Case for the upcoming year (Yes/No).
      search_terms:
        - HHC_BEXCL01
        - reside with Index Case
        - upcoming year
      catalog_tier: dataset_backed
      analysis_queryable: true
    HHC_BINCL02:
      display_label: Willing for Tuberculin Skin Test
      normalized_meaning: Inclusion criterion — whether the candidate is willing to have a Tuberculin Skin Test placed (Yes/No).
      search_terms:
        - HHC_BINCL02
        - Tuberculin Skin Test
        - TST
      catalog_tier: dataset_backed
      analysis_queryable: true
    HHC_WILLING:
      display_label: Willing and Able to Participate
      normalized_meaning: Inclusion criterion — whether the candidate is willing and able to participate in the study (Yes/No).
      search_terms:
        - HHC_WILLING
        - willing and able
        - participate in the study
      catalog_tier: dataset_backed
      analysis_queryable: true
    HHC_TBHX:
      display_label: Previous History of TB
      normalized_meaning: Exclusion criterion — whether the candidate has a previous history of TB (Yes/No). For eligibility this question must be answered NO.
      search_terms:
        - HHC_TBHX
        - previous history of TB
        - TB history
        - exclusion criterion
      catalog_tier: dataset_backed
      analysis_queryable: true
    HHC_ELIGIBLE:
      display_label: Candidate Eligible
      normalized_meaning: Final screening result — whether the candidate is eligible (inclusion answered YES, exclusion answered NO).
      search_terms:
        - HHC_ELIGIBLE
        - candidate eligible
        - final screening
        - eligibility
      catalog_tier: dataset_backed
      analysis_queryable: true
    HHC_ENROLL:
      display_label: Candidate Enrolled
      normalized_meaning: Final screening result — whether the candidate was enrolled in the parent protocol (Yes/No).
      search_terms:
        - HHC_ENROLL
        - candidate enrolled
        - enrollment
      catalog_tier: dataset_backed
      analysis_queryable: true
    HHC_NOTENROLL:
      display_label: Reason Not Enrolled
      normalized_meaning: Free-text reason captured when an eligible candidate was not enrolled.
      search_terms:
        - HHC_NOTENROLL
        - reason not enrolled
        - not enrolled
      catalog_tier: dataset_backed
      analysis_queryable: false
    SUBJID2:
      display_label: Participant ID (Page 2)
      normalized_meaning: Pseudonymized identifier repeated on page 2 for cross-page traceability — duplicate candidate of SUBJID.
      search_terms:
        - SUBJID2
        - Household contact ID
        - participant id page 2
      catalog_tier: dataset_backed
      analysis_queryable: true
    HHC_CP1:
      display_label: Repository Cough Symptom Screen
      normalized_meaning: Repository criterion — whether the candidate reports persistent cough or other TB-suggestive symptoms (Yes/No).
      search_terms:
        - HHC_CP1
        - persistent cough
        - cough up blood
        - extrapulmonary TB
        - night sweats
        - repository criteria
      catalog_tier: dataset_backed
      analysis_queryable: true
    HHC_CP1a:
      display_label: Chest X-Ray or Sputum Ruled Out TB
      normalized_meaning: Repository criterion follow-up — whether a chest x-ray and/or sputum culture has ruled out active TB (asked when HHC_CP1 = YES).
      search_terms:
        - HHC_CP1a
        - chest x-ray
        - sputum culture
        - ruled out active TB
      catalog_tier: dataset_backed
      analysis_queryable: true
    HHC_STORAGE1:
      display_label: Specimen Storage Indicator 1
      normalized_meaning: Specimen-storage indicator paired with the repository criteria — review_required because no PDF visible text or annotation matched.
      search_terms:
        - HHC_STORAGE1
        - specimen storage
      catalog_tier: source_only
      analysis_queryable: false
    HHC_STORAGE2:
      display_label: Specimen Storage Indicator 2
      normalized_meaning: Specimen-storage indicator paired with the repository criteria — review_required because no PDF visible text or annotation matched.
