# Form 6 — HIV Treatment and CD4 Enumeration
# Lean SoT — only signal: form metadata, variables (section/question/widget/options/units/skip logic),
# instructions, and known discrepancies. No paths, no coordinates, no governance
# plumbing, no tautological per-variable repetition, no derivable counts.

study: "Indo-US VAP Biomarkers for Risk of Tuberculosis and for Tuberculosis Treatment Failure and Relapse"

form:
  number: Form 6
  title: "HIV Treatment and  CD4 Enumeration"     # printed with two spaces before "CD4"
  version: v1.0
  revision_date: 2014-05-22
  page_count: 1
  subjid_layout: "[1][0][2] - [0][_][_][_][_] - [_]  (group 1 pre-printed '102'; group 2 first box pre-printed '0', remaining 4 free; group 3 = 1 free)"
  subjid_format: "102-0NNNN-X"

sections:
  header:                 { label: null, note: "form-header band (no printed section label)" }
  hiv_testing:            { label: "HIV TESTING" }
  hiv_treatment_regimen:  { label: "HIV TREATMENT REGIMEN" }
  cd4_enumeration:        { label: "CD4 ENUMERATION" }
  completion:             { label: null, note: "signature/completion block (no printed section label)" }
  system:                 { label: null, note: "not on form — system-generated" }

# Standalone italic instructions printed on the form (verbatim).
# (Inline option labels like "Yes, record HIV test date and result below" are NOT instructions —
#  they are option labels of their parent variable. See HIV_HIVND.options.)
instructions:
  - id: I1
    text: "If negative, skip to bottom of form, sign and enter date."
    location: standalone italic line below the Q1 box outline
    effect: when HIV_HIV == "Negative (-)", skip Q2/Q2a/Q3/3a/3b and go to completion block
  - id: I2
    text: "If Yes, record CD4 test date and results below."
    location: inline italic beneath the Yes/No checkboxes of Q3 (HIV_CD4DONE)
    effect: gates HIV_CD4DAT (3a) and 3b group (HIV_CD4 / HIV_CD4LY / HIV_CD4ND / HIV_CD4LYND)

# Visible directional arrows.
arrows:
  - { from: "HIV_ARTTX (Yes)", to: "HIV_ARTDAT (Day box)" }
  - { from: "HIV_CD4DONE (Yes)", to: "instruction I2" }

# Known printed-form-vs-annotation discrepancies.
discrepancies:
  - kind: pdf_annotation_label_typo
    where: "annotation written above the 3a date boxes"
    pdf_annotation_says: HIV_ARTDAT
    printed_form_truth: "3a. CD4 Test Date"
    dataset_column_binding: HIV_CD4DAT
    resolution: "printed form question/position is authoritative for clinical meaning; dataset header supplies the binding name only"

# Variables — dataset-column order. Variable name = dataset column name (= YAML key).
# Only fields with actual content are listed per variable.
#
# Field provenance:
#   pdf_label / pdf_question / pdf_subsection / widget / options
#                          → verbatim or directly observed from the form
#   type / format / units / precision
#                          → derived from widget shape or dataset header/column name only
#   skip_logic             → "printed" parts cite arrows/instructions on the form;
#                            parts marked "inferred" are logical conclusions, not on the form
#   notes                  → mixture; each note is self-labelled
#   phi                    → policy hint, NOT form-truth; downstream PHI-handling intent only
variables:

  # --- Form header ---
  SUBJID:
    section: header
    pdf_question: "Participant ID Number:"
    widget: "9 character-boxes laid out as [1][0][2] - [0][_][_][_][_] - [_]"
    type: identifier
    format: "102-0NNNN-X (study prefix 102 + pre-printed '0' + 4-digit participant number + 1 alphanumeric suffix)"
    phi: pseudonymize

  HIV_VISIT:
    section: header
    pdf_question: "Check appropriate participant box:"
    widget: "4 mutually exclusive checkboxes (stacked)"
    options:
      - "Index case (baseline)"
      - "Index case (treatment failure/relapse)"
      - "Household contact (incident TB case)"
      - "Household contact (co-prevalent TB case)"

  ICTC:
    section: header
    pdf_question: "ICTC CODE:"
    widget: "3 character-boxes"
    type: code
    format: "3-character code"
    phi: pseudonymize

  # --- HIV TESTING ---
  HIV_HIVND:
    section: hiv_testing
    pdf_question: "1. Was an HIV test done?"
    widget: "3 mutually exclusive checkboxes"
    options:
      - "Yes, record HIV test date and result below"      # branch → unlocks HIV_HIVDAT, HIV_HIV
      - "No, previous positive"
      - "No, specify reason"                              # branch → unlocks HIV_HIVNDOTH
    skip_logic: "drives HIV_HIVDAT, HIV_HIV, HIV_HIVNDOTH"

  HIV_HIVDAT:
    section: hiv_testing
    pdf_question: "1a. HIV Test Date:"
    widget: "Day(2) / Month(2) / Year(4)"
    type: date
    skip_logic: "only completed when HIV_HIVND == 'Yes, record HIV test date and result below'"

  HIV_HIV:
    section: hiv_testing
    pdf_question: "1b. HIV Test Result:"
    widget: "3 mutually exclusive checkboxes (inline)"
    options:
      - "Positive (+)"
      - "Negative (-)"
      - "Indeterminate"
    skip_logic: "only completed when HIV_HIVND == 'Yes, …'; if 'Negative (-)' then instruction I1 directs skip to completion block"

  HIV_HIVNDOTH:
    section: hiv_testing
    pdf_question: null                # no printed question — only a free-text underline beside the "No, specify reason" option of HIV_HIVND
    widget: "single-line free-text underline beside HIV_HIVND option 'No, specify reason'"
    type: free_text
    skip_logic: "only completed when HIV_HIVND == 'No, specify reason'"

  # --- HIV TREATMENT REGIMEN ---
  HIV_ARTTX:
    section: hiv_treatment_regimen
    pdf_question: "2. Is the participant currently on an ART regimen?"
    widget: "2 mutually exclusive checkboxes (inline)"
    options: ["Yes", "No"]
    skip_logic: "downward arrow printed from the Yes checkbox to HIV_ARTDAT's Day box"

  HIV_ARTDAT:
    section: hiv_treatment_regimen
    pdf_question: "2a. When did the participant initiate ART?"
    widget: 'Day(2) / Month(2) / Year(4); adjacent "Not Done" checkbox to the right (captured as HIV_ARTND)'
    type: date
    skip_logic: "conditional on HIV_ARTTX == Yes (per printed arrow); inferred mutually exclusive with HIV_ARTND"

  HIV_ARTND:
    section: hiv_treatment_regimen
    pdf_question: "Not Done"          # printed checkbox label adjacent to the 2a date boxes
    widget: "single checkbox, right of HIV_ARTDAT date boxes"
    options: ["Not Done"]
    skip_logic: "inferred mutually exclusive with completing HIV_ARTDAT (not printed on form)"

  # --- CD4 ENUMERATION ---
  HIV_CD4DONE:
    section: cd4_enumeration
    pdf_label: "3. CD4 Testing"        # printed in the left cell of the row (question label)
    pdf_question: "Was a CD4 test done?"   # printed in the right cell (actual question text)
    widget: "2 mutually exclusive checkboxes (inline)"
    options: ["Yes", "No"]
    skip_logic: "when Yes (per instruction I2), unlocks HIV_CD4DAT and the 3b group (HIV_CD4 / HIV_CD4LY / HIV_CD4ND / HIV_CD4LYND)"

  HIV_CD4DAT:
    section: cd4_enumeration
    pdf_question: "3a. CD4 Test Date"
    widget: "Day(2) / Month(2) / Year(4)"
    type: date
    skip_logic: "only completed when HIV_CD4DONE == Yes"
    notes: 'PDF annotation written above the 3a date boxes says "HIV_ARTDAT", but the printed form question and CD4 section placement identify the clinical field as CD4 Test Date; dataset column HIV_CD4DAT supplies the binding name only (see top-level discrepancies block)'

  HIV_CD4:
    section: cd4_enumeration
    pdf_label: "3b. CD4 Test Results"        # row label (shared with HIV_CD4LY)
    pdf_subsection: "Part I: Absolute Counts"
    pdf_question: "CD4 cells/mm3:"
    widget: "4 character-boxes (integer)"
    type: integer
    units: "cells/mm³"
    skip_logic: "only completed when HIV_CD4DONE == Yes; inferred mutually exclusive with HIV_CD4ND"

  HIV_CD4LY:
    section: cd4_enumeration
    pdf_label: "3b. CD4 Test Results"        # row label (shared with HIV_CD4)
    pdf_subsection: "Part II: CD4%"
    pdf_question: "CD4 %:"
    widget: 'fixed mask [X][X].[X] %  (2 boxes, printed ".", 1 box, printed "%")'
    type: decimal
    units: "percent (%)"
    precision: "1 decimal place (per the printed mask)"
    skip_logic: "only completed when HIV_CD4DONE == Yes; inferred mutually exclusive with HIV_CD4LYND"

  HIV_CD4ND:
    section: cd4_enumeration
    pdf_question: "Not Done/Unknown"  # printed checkbox label under Part I (Absolute Counts)
    widget: "single checkbox, under HIV_CD4 in the Part I cell"
    options: ["Not Done/Unknown"]
    skip_logic: "inferred mutually exclusive with completing HIV_CD4 (not printed on form)"

  HIV_CD4LYND:
    section: cd4_enumeration
    pdf_question: "Not Done/Unknown"  # printed checkbox label under Part II (CD4%)
    widget: "single checkbox, under HIV_CD4LY in the Part II cell"
    options: ["Not Done/Unknown"]
    skip_logic: "inferred mutually exclusive with completing HIV_CD4LY (not printed on form)"

  # --- Completion ---
  HIV_SIGN:
    section: completion
    pdf_question: "Signature of Data Collector:"
    widget: "signature line"
    type: signature
    phi: drop

  HIV_INIT:
    section: completion
    pdf_question: "Initials:"
    widget: "3 character-boxes"
    type: initials
    phi: drop

  HIV_COMPDAT:
    section: completion
    pdf_question: "Date Completed:"
    widget: "Day(2) / Month(2) / Year(4)"
    type: date
    phi: jitter_date

  # --- System-generated ---
  Time_Stamp:
    section: system
    pdf_question: null                     # not on form
    widget: "dataset-only column, auto-populated by capture system"
    type: datetime
    phi: drop
