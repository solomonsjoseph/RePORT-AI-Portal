      Monthly or less
      2 to 4 times a month
      2 to 3 times a week
      4 or more times a week
      14b. How many drinks containing alcohol do you have on a typical day when you are drinking?
      1 or 2
      3 or 4
      5 or 6
      7, 8 or 9
      10 or more
      14c. How often do you have six or more drinks on one occasion?
      Never
      Less than monthly
      Monthly
      Weekly
      Daily or almost daily
      If the answer to 14b is "1 or 2" and the answer to 14c is "Never," then skip to Questions 15i and j.
      14d. How often during the last year have you found that you were not able to stop drinking once you started?
      Never
      Less than monthly
      Monthly
      Weekly
      Daily or almost daily
      14e. How often during the last year have you failed to do what was normally expected from you because of drinking?
      Never
      Less than monthly
      Monthly
      Weekly
      Daily or almost daily
      14f. How often during the last year have you needed a first drink in the morning to get yourself going after a heavy drinking session?
      Never
      Less than monthly
      Monthly
      Weekly
      Daily or almost daily
      14g. How often during the last year have you had a feeling of guilt or remorse after drinking?
      Never
      Less than monthly
      Monthly
      Weekly
      Daily or almost daily
      14h. How often during the last year have you been unable to remember what happened the night before because you had been drinking?
      Never
      Less than monthly
      Monthly
      Weekly
      Daily or almost daily
      14i. Have you or someone else been injured as a result of your drinking?
      No
      Yes, but not in the last year
      Yes, during the last year
      14j. Has a relative or friend or a doctor or another health worker been concerned about your drinking or suggested you cut down?
      No
      Yes. but not in the last year
      Yes, during the last year
      15. When did you have your last drink?
      Never (skip to question 21)
      More than one month ago
      Within the last 30 days
      Within the last 7 days
      Today
      If choice other than "Never," answer questions 16-20:
      16. How often do you visit arrack shops?
      Never
      Less than monthly
      Monthly
      Weekly
      Daily or almost daily
      17. How old were you when you had your first drink?
      years
      18. How old were you when you started drinking regularly?
      years
      19. What is the most number of drinks you can have before getting sick or passing out?
      drinks
      20. Was there a time in your life when you drank more heavily than you do now?
      Yes
      No
