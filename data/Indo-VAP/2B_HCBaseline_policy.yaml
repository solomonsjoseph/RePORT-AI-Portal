      Date of evaluation:
      Day                       Month                    Year
      / /
      1. What is your relationship to [ the Index Case ]? You are their:
      Spouse
      Father
      Mother
      Son/Daughter
      Brother/Sister
      Grandparent
      Grandchild
      Aunt/Uncle by birth
      Niece/Nephew
