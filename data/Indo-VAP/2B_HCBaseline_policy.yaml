      Married/Living Together
      Separated/Divorced
      Widowed
      Not applicable (child less than 10)
      3. For how many years did you go to school?
      years    (Enter 00 if subject did not go to school.)
      Refused to answer
      Don't know
  exposure_to_index_case:
    section_label: EXPOSURE TO INDEX CASE
    fields:
      - HC_EXPDAY
      - HC_EXPWK
