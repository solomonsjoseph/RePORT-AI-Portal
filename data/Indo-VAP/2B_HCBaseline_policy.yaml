        - type: question
          text: "22. Who provided the answers to these questions?"
          related_variables:
            - HC_RESPNDT
            - HC_RESPDNTSP
        - type: option_block
          text: |
            The subject (household contact)
            Another person on behalf of the contact (specify relationship)
          related_variables:
            - HC_RESPNDT
            - HC_RESPDNTSP
        - type: question
          text: "23.  Is a BCG scar present? (Examine the individual)"
          related_variables:
            - HC_BCGSCAR
