pdf_visible_text:
  by_page:
    - page: 1
      blocks:
        - type: heading
          text: |
            Indo-US VAP Biomarkers for Risk of Tuberculosis and for Tuberculosis Treatment Failure and Relapse
          related_variables: []
        - type: heading
          text: "HOUSEHOLD CONTACT: Clinical/Demographic Form"
          related_variables: []
        - type: instruction
          text: One form per contact must be completed for each member of the household at least 6 years of age.  The purpose of this questionnaire is to describe personal characteristics in each household member and level of contact with the Index TB Case.
          related_variables: []
        - type: instruction
          text: 'When reading the questions, refer to the index case by their relation to the household contact (e.g. "your mother").'
          related_variables: []
        - type: instruction
          text: We would like to ask you some questions about the time you spend with [ the Index Case ] and your health. This survey should take about 15 minutes. The information you provide will be used to better undertand how tuberculosis affects people. Your answers wiill remain anonymous. Your name will not be written on the questionnaire. At any time, if there is a question that you'd rather not answer, please let me know and we can skip that question. Some of the questions may be sensitive, but please do your best to answer honestly. At this time do want to ask me anything about the survey? (Answer any questions and address respondent's concerns.)
          related_variables: []
        - type: instruction
          text: May I begin the interview now?  Proceed if subject agrees.
          related_variables: []
        - type: instruction
          text: We will begin with a few questions about yourself.
          related_variables: []
        - type: question
          text: "Date of evaluation:"
          related_variables:
            - HC_VISDAT
        - type: caption
          text: "Day                       Month                    Year"
          related_variables:
            - HC_VISDAT
        - type: question
          text: "Household contact ID number:"
          related_variables:
            - SUBJID
        - type: question
          text: "Family ID:"
          related_variables:
            - FID
        - type: section_label
          text: DEMOGRAPHICS
          related_variables:
            - HC_RELATN
            - HC_RELATNSP
            - HC_MARISTAT
            - HC_SCHOOLDU
            - HC_SCHOOLDK
        - type: question
          text: "1. What is your relationship to [ the Index Case ]? You are their:"
          related_variables:
            - HC_RELATN
        - type: option_block
          text: |
            Spouse
            Father
            Mother
            Son/Daughter
            Brother/Sister
            Grandparent
            Grandchild
            Aunt/Uncle by birth
            Niece/Nephew
            Aunt/Uncle by marriage
            Cousin
            Half-sibling
            Step-family member
            Adopted son/daughter
            You are their servant
            Your servant
            They are your border
            You are their border
            Roommate
            Other, specify:
          related_variables:
            - HC_RELATN
            - HC_RELATNSP
        - type: question
          text: "2. What is your marital status?"
          related_variables:
            - HC_MARISTAT
        - type: option_block
          text: |
            Never Married
            Married/Living Together
            Separated/Divorced
            Widowed
            Not applicable (child less than 10)
          related_variables:
            - HC_MARISTAT
        - type: question
          text: "3. For how many years did you go to school?"
          related_variables:
            - HC_SCHOOLDU
            - HC_SCHOOLDK
        - type: caption
          text: "years    (Enter 00 if subject did not go to school.)"
          related_variables:
            - HC_SCHOOLDU
        - type: option_block
          text: |
            Refused to answer
            Don't know
          related_variables:
            - HC_SCHOOLDK
        - type: section_label
          text: EXPOSURE TO INDEX CASE
          related_variables:
            - HC_EXPDAY
            - HC_EXPWK
            - HC_LIVEDY
            - HC_LIVEDM
        - type: instruction
          text: Now I will ask you a few more questions about your relationship with [ the Index Case ].
          related_variables: []
        - type: question
          text: "4. Over the past 3 months, did you spend time in the presence of [ the Index Case ] every day ?"
          related_variables:
            - HC_EXPDAY
        - type: option_block
          text: |
            Yes
            No If NO, on average how many days per week do you spend some time in the presence of [the Index Case ]?
          related_variables:
            - HC_EXPDAY
            - HC_EXPWK
        - type: caption
          text: HC EXP
          related_variables:
            - HC_EXPDAY
            - HC_EXPWK
        - type: question
          text: "5.  How long have you lived with [ the Index Case ]? (Enter months OR years)"
          related_variables:
            - HC_LIVEDY
            - HC_LIVEDM
        - type: caption
          text: "OR years months"
          related_variables:
            - HC_LIVEDY
            - HC_LIVEDM
    - page: 2
      blocks:
        - type: question
          text: "6.  Over the past 3 months, on the days that you had contact with [ the Index Case ], on averagehow many hours per day did you spend in the same house with [ the Index Case ]?"
          related_variables:
            - HC_EXPH
        - type: question
          text: "7.  How many meals per day did you share with [the Index Case ] on average in the past 3 months?"
          related_variables:
            - HC_MEAL
        - type: option_block
          text: |
            None
            1
            2
            3 or more
          related_variables:
            - HC_MEAL
        - type: question
          text: "8. Before [ the Index Case ] was diagnosed with tuberculosis, how close did you sleep to [ the Index Case ] most nights?  (Read options aloud) (check one answer)"
          related_variables:
            - HC_SLEEPHX
            - HC_SLEEPHXSP
        - type: option_block
          text: |
            Same  room, same  bed
            Same  room, different  bed
            Same  building, different  room
            Different building that is part of the same household
            Other (specify)
          related_variables:
            - HC_SLEEPHX
            - HC_SLEEPHXSP
        - type: question
          text: "9. Now, since [ the Index Case ] was diagnosed with tuberculosis, how close do you sleep to [ the Index Case ] most nights? (Read options aloud) (check one answer)"
          related_variables:
            - HC_SLEEPPRES
            - HC_SLEEPPRESSP
        - type: option_block
          text: |
            Same  room, same bed
            Same  room, different bed
            Same  building, different room
            Different building that is part of the same household
            Other (specify)
          related_variables:
            - HC_SLEEPPRES
            - HC_SLEEPPRESSP
        - type: question
          text: "10. Since [the Index Case] became ill, have you helped care for him/her by bringing him/her food or drinks, helping him/her dress, or otherwise attending to his/her needs?"
          related_variables:
            - HC_CARE
        - type: option_block
          text: |
            Yes (Go to 10a)
            No
          related_variables:
            - HC_CARE
        - type: question
          text: "10a. If yes, how often on average?"
          related_variables:
            - HC_CAREH
        - type: option_block
          text: |
            <1 hour per day
            Between 1-6 hours per day
            More than 6 but less than 12 hours per day
            12 or more but less than 18 hours per day
            18 hours or more  per day
            Don't know
          related_variables:
            - HC_CAREH
        - type: question
          text: "Household contact ID number:"
          related_variables:
            - SUBJID2
    - page: 3
      blocks:
        - type: section_label
          text: TB HISTORY
          related_variables:
            - HC_TBDX
            - HC_TBLNG
            - HC_TBTST
            - HC_INH1
            - HC_INH2
            - HC_CONTOTH
        - type: instruction
          text: Now I will ask you a few questions about any history that you have with TB disease.
          related_variables: []
        - type: question
          text: "11. As far as you know, have you ever been diagnosed with any form of tuberculosis?"
          related_variables:
            - HC_TBDX
        - type: option_block
          text: |
            Yes (go to 11a)
            No
          related_variables:
            - HC_TBDX
        - type: question
          text: "11a. Were you told that your TB disease just involves your lungs?"
          related_variables:
            - HC_TBLNG
        - type: option_block
          text: |
            Yes
            No
            Don't Know
          related_variables:
            - HC_TBLNG
        - type: question
          text: "12. Have you ever been told that you have a positive skin test for tuberculosis?"
          related_variables:
            - HC_TBTST
        - type: option_block
          text: |
            Yes (go to 12a)
            No
            Don't Know
          related_variables:
            - HC_TBTST
        - type: question
          text: "12a. Have you ever taken a medicine called Isoniazid to treat this?"
          related_variables:
            - HC_INH1
        - type: option_block
          text: |
            Yes (go to 12b)
            No
            Don't Know
          related_variables:
            - HC_INH1
        - type: question
          text: "12b. Are you currently taking Isoniazid?"
          related_variables:
            - HC_INH2
        - type: option_block
          text: |
            Yes
            No
          related_variables:
            - HC_INH2
        - type: question
          text: "13.  Have you ever known anyone with TB other than [the Index Case ]?"
          related_variables:
            - HC_CONTOTH
        - type: option_block
          text: |
            Yes
            No
            Don't Know
          related_variables:
            - HC_CONTOTH
        - type: section_label
          text: RISK BEHAVIOURS
          related_variables:
            - HC_ALCFRQ
            - HC_ALCDOSTX
            - HC_ALCUSE
        - type: instruction
          text: Now I am going to ask you some questions about your use of alcoholic beverages during this past year.
          related_variables: []
        - type: instruction
          text: Use the alcohol Beverage Card to show the different types and sizes of drinks.
          related_variables: []
        - type: question
          text: "14a. How often do you have a drink containing alcohol?"
          related_variables:
            - HC_ALCFRQ
        - type: option_block
          text: |
            Never (skip to question 15)
            Monthly or less
            2 to 4 times a month
            2 to 3 times a week
            4 or more times a week
          related_variables:
            - HC_ALCFRQ
        - type: question
          text: "14b. How many drinks containing alcohol do you have on a typical day when you are drinking?"
          related_variables:
            - HC_ALCDOSTX
        - type: option_block
          text: |
            1 or 2
            3 or 4
            5 or 6
            7, 8 or 9
            10 or more
          related_variables:
            - HC_ALCDOSTX
        - type: question
          text: "14c. How often do you have six or more drinks on one occasion?"
          related_variables:
            - HC_ALCUSE
        - type: option_block
          text: |
            Never
            Less than monthly
            Monthly
            Weekly
            Daily or almost daily
          related_variables:
            - HC_ALCUSE
        - type: question
          text: "Household contact ID number:"
          related_variables:
            - SUBJID3
    - page: 4
      blocks:
        - type: instruction
          text: Now I will ask you a few questions about your smoking habits.
          related_variables: []
        - type: question
          text: "15. Have you ever smoked tobacco?"
          related_variables:
            - HC_SMOKHX
        - type: option_block
          text: |
            Yes, current smoker (Go to 16)
            Yes, former smoker (Go to 16)
            No (Skip to 16)
          related_variables:
            - HC_SMOKHX
        - type: question
          text: "18. Which of the following have you ever smoked regularly:"
          related_variables:
            - HC_SMKTYP
        - type: option_block
          text: |
            Beedis, hand-rolled cigarettes, or manufactured unfiltered cigarettes
            Manufactured filtered cigarettes
            Cigars, cheeroots, or cigarillos
            Hookah
            Other, specify:
          related_variables:
            - HC_SMKTYP
            - BIDIYN
            - CIGYN
            - CGRYN
            - HOOYN
            - SMOYN
            - HC_SMOKEOTH
        - type: instruction
          text: "If checked ask the following questions:"
          related_variables: []
        - type: caption
          text: "How long have you smoked these?"
          related_variables:
            - HC_BIDIDURY
            - HC_BIDIDURM
            - HC_CIGDURY
            - HC_CIGDURM
            - HC_CGRDURY
            - HC_CGRDURM
            - HC_HOODURY
            - HC_HOODURM
            - HC_SMODURY
            - HC_SMODURM
        - type: caption
          text: "Over the time that you've smoked, around how many did you smoke per day?"
          related_variables:
            - HC_BIDIPAST
            - HC_CIGPAST
            - HC_CGRPAST
            - HC_SMOPAST
        - type: caption
          text: "On average, how many do you currently smoke per day?"
          related_variables:
            - HC_BIDICURR
            - HC_CIGCURR
            - HC_CGRCURR
            - HC_SMOCURR
        - type: caption
          text: "If you are not currently smoking these days, how long has it been since you quit?"
          related_variables:
            - HC_BIDIQUITY
            - HC_BIDIQUITM
            - HC_CIGQUITY
            - HC_CIGQUITM
            - HC_CGRQUITY
            - HC_CGRQUITM
            - HC_HOOQUITY
            - HC_HOOQUITM
            - HC_SMOQUITY
            - HC_SMOQUITM
        - type: caption
          text: Enter 00 if not a current smoker
          related_variables:
            - HC_BIDICURR
            - HC_CIGCURR
            - HC_CGRCURR
            - HC_HOOCURRH
            - HC_HOOCURRM
            - HC_SMOCURR
        - type: caption
          text: "When you smoked these, around how long did you smoke per day?"
          related_variables:
            - HC_HOOPASTH
            - HC_HOOPASTM
        - type: caption
          text: "On average, how much time do you currently spend smoking per day?"
          related_variables:
            - HC_HOOCURRH
            - HC_HOOCURRM
        - type: caption
          text: "years     OR months"
          related_variables:
            - HC_BIDIDURY
            - HC_BIDIDURM
            - HC_CIGDURY
            - HC_CIGDURM
            - HC_CGRDURY
            - HC_CGRDURM
            - HC_HOODURY
            - HC_HOODURM
            - HC_SMODURY
            - HC_SMODURM
        - type: caption
          text: "hours     OR minutes"
          related_variables:
            - HC_HOOPASTH
            - HC_HOOPASTM
            - HC_HOOCURRH
            - HC_HOOCURRM
        - type: question
          text: "Household contact ID number:"
          related_variables:
            - SUBJID4
    - page: 5
      blocks:
        - type: instruction
          text: I will now ask you some questions about your past health and how you are feeling. (If the participant is a child, the parent or guardian may respond.)
          related_variables: []
        - type: section_label
          text: CLINICAL QUESTIONS
          related_variables:
            - HC_MEDHx
            - COPD
            - Cancer
            - Removstom
            - Hepatitis
            - Kidneyfail
            - Silicosis
        - type: question
          text: "17.  Have you ever been diagnosed with or been told you have the following:"
          related_variables:
            - HC_MEDHx
            - COPD
            - Cancer
            - Removstom
            - Hepatitis
            - Kidneyfail
            - Silicosis
        - type: option_block
          text: |
            Chronic obstructive pulmonary disease (COPD)
            Cancer
            Partial or complete removal of your stomach
            Hepatitis (infection of the liver)
            Chronic kidney failure requiring hemodialysis
            Silicosis
          related_variables:
            - HC_MEDHx
            - COPD
            - Cancer
            - Removstom
            - Hepatitis
            - Kidneyfail
            - Silicosis
        - type: section_label
          text: HIV
          related_variables:
            - HC_HIV
            - HC_HIVLOC
        - type: question
          text: "18. Have you been tested for HIV in the past 6 months?"
          related_variables:
            - HC_HIV
        - type: option_block
          text: |
            Yes (Go to 18a)
            No
            Don't know
          related_variables:
            - HC_HIV
        - type: question
          text: "18a. Where were you last tested?"
          related_variables:
            - HC_HIVLOC
            - HC_HIVLOCSP
        - type: section_label
          text: DIABETES MELLITUS
          related_variables:
            - HC_DMDX
            - HC_DMDXY
            - HC_DMTX
            - HC_DMTXSP
        - type: question
          text: "19. Have you ever been diagnosed with Diabetes Mellitus?"
          related_variables:
            - HC_DMDX
        - type: option_block
          text: |
            Yes (Go to 18a-b)
            No
            Don't know
          related_variables:
            - HC_DMDX
        - type: question
          text: "19a. In what year were you diagnosed?"
          related_variables:
            - HC_DMDXY
        - type: question
          text: "19b. How have you managed your diabetes this past month?"
          related_variables:
            - HC_DMTX
            - HC_DMTXSP
        - type: option_block
          text: |
            Insulin injections
            Oral medication
            Other injectable medications
            Dietary changes only
            Unknown
            Other (specify):
          related_variables:
            - HC_DMTX
            - HC_DMTXSP
        - type: question
          text: "20.  Have you had any of the following signs/symptoms within the past 4 weeks?"
          related_variables:
            - HC_COUGH
            - HC_FEVER
            - HC_NIGHTSWT
            - HC_WTLOSS
            - HC_FAILTHRV
            - HC_CHSTPAIN
            - HC_FATIGUE
        - type: caption
          text: "*If \"Yes,\" collect sputum sample after completing the questionnaire. This person may have TB."
          related_variables:
            - HC_COUGH
        - type: question
          text: "Cough Yes No"
          related_variables:
            - HC_COUGH
        - type: question
          text: "Coughing up blood? Yes No"
          related_variables:
            - HC_COUGHBLD
        - type: caption
          text: "Duration: weeks"
          related_variables:
            - HC_COUGHDUR
            - HC_FEVERDUR
            - HC_NIGHTSWTDUR
            - HC_WTLOSSDUR
        - type: instruction
          text: "Or if duration unknown, ask: Has your cough lasted:"
          related_variables:
            - HC_COUGHCAT
        - type: option_block
          text: |
            0-14 days
            15-28 days
            > 28 days
          related_variables:
            - HC_COUGHCAT
        - type: question
          text: "Fever Yes No Unknown"
          related_variables:
            - HC_FEVER
            - HC_FEVERUNK
        - type: question
          text: "Excessive night sweats Yes No Unknown"
          related_variables:
            - HC_NIGHTSWT
            - HC_NIGHTSWTUNK
        - type: question
          text: "Unexpected weight loss Yes No Unknown"
          related_variables:
            - HC_WTLOSS
            - HC_WTLOSSUNK
        - type: question
          text: "Loss of appetite if adult or failure to gain weight if child Yes No Unknown"
          related_variables:
            - HC_FAILTHRV
        - type: question
          text: "Chest pain especially with coughing or taking a deep breath Yes No Unknown"
          related_variables:
            - HC_CHSTPAIN
        - type: question
          text: "Fatigue Yes No Unknown"
          related_variables:
            - HC_FATIGUE
        - type: question
          text: "Household contact ID number:"
          related_variables:
            - SUBJID5
    - page: 6
      blocks:
        - type: section_label
          text: CLINICAL ASSESSMENT
          related_variables:
            - HC_ARM
            - HC_WEIGHT
            - HC_HEIGHT
            - HC_KNEEHT
            - HC_WEIGHTESTIMATE
            - HC_PREGNANT
            - HC_GESTAGE
        - type: instruction
          text: We have finished the questionnaire portion of this form. The nurse will now take a few measurements, including your height and weight.
          related_variables: []
        - type: question
          text: "21. Do you have any prescriptions from the doctor or pill bottles you are currently taking medication from?"
          related_variables:
            - HC_STEROIDS
        - type: instruction
          text: Ask to see the participant's perscriptions and/or pill bottles if they have any.
          related_variables: []
        - type: instruction
          text: "Check the names of any medications you see on the list to the right:"
          related_variables:
            - HC_STEROIDS
        - type: option_block
          text: |
            Wysolone
            Omnocortil
            Solumendrol
            Betnesol
            Betnelam
            Hisone
            Dexona
            Decdak
            Decmax
            Fluricot
          related_variables:
