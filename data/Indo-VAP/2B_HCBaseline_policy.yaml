    visible_text: |
      TB HISTORY
      Now I will ask you a few questions about any history that you have with TB disease.
      11. As far as you know, have you ever been diagnosed with any form of tuberculosis?
      Yes (go to 11a)
      No
      11a. Were you told that your TB disease just involves your lungs?
      Yes
      No
      Don't Know
      12. Have you ever been told that you have a positive skin test for tuberculosis?
      Yes (go to 12a)
      No
      Don't Know
      12a. Have you ever taken a medicine called Isoniazid to treat this?
      Yes (go to 12b)
      No
      Don't Know
      12b. Are you currently taking Isoniazid?
      Yes
      No
      13.  Have you ever known anyone with TB other than [the Index Case ]?
      Yes
      No
      Don't Know
