      - HC_CAREH
    visible_text: |
      EXPOSURE TO INDEX CASE
      Now I will ask you a few more questions about your relationship with [ the Index Case ].
      4. Over the past 3 months, did you spend time in the presence of [ the Index Case ] every day ?
      Yes
      No If NO, on average how many days per week do you spend some time in the presence of [the Index Case ]?
      HC EXP
      5.  How long have you lived with [ the Index Case ]? (Enter months OR years)
      OR years months
      6.  Over the past 3 months, on the days that you had contact with [ the Index Case ], on averagehow many hours per day did you spend in the same house with [ the Index Case ]?
      7.  How many meals per day did you share with [the Index Case ] on average in the past 3 months?
      None
      1
      2
      3 or more
      8. Before [ the Index Case ] was diagnosed with tuberculosis, how close did you sleep to [ the Index Case ] most nights?  (Read options aloud) (check one answer)
      Same  room, same  bed
      Same  room, different  bed
      Same  building, different  room
      Different building that is part of the same household
      Other (specify)
      9. Now, since [ the Index Case ] was diagnosed with tuberculosis, how close do you sleep to [ the Index Case ] most nights? (Read options aloud) (check one answer)
      Same  room, same bed
      Same  room, different bed
      Same  building, different room
      Different building that is part of the same household
      Other (specify)
      10. Since [the Index Case] became ill, have you helped care for him/her by bringing him/her food or drinks, helping him/her dress, or otherwise attending to his/her needs?
      Yes (Go to 10a)
      No
      10a. If yes, how often on average?
      <1 hour per day
      Between 1-6 hours per day
      More than 6 but less than 12 hours per day
      12 or more but less than 18 hours per day
      18 hours or more  per day
      Don't know
