catalog_refs:
  by_variable:
    SUBJID:
      display_label: Participant ID
      normalized_meaning: Pseudonymized identifier for the study participant.
      search_terms:
        - SUBJID
        - Participant ID number
        - participant id
        - subject id
      catalog_tier: dataset_backed
      analysis_queryable: true
    FID:
      display_label: Family ID
      normalized_meaning: Pseudonymized family/household identifier linking participants from the same household.
      search_terms:
        - FID
        - Family ID number
        - family id
        - household id
      catalog_tier: dataset_backed
      analysis_queryable: true
    CBC_VISDAT:
      display_label: Date of Blood Draw
      normalized_meaning: Date the blood specimen for the CBC visit was drawn (Day/Month/Year), jittered for PHI handling.
      search_terms:
        - CBC_VISDAT
        - Date of blood draw
        - blood draw date
        - specimen collection date
      catalog_tier: dataset_backed
      analysis_queryable: true
    CBC_VISIT:
      display_label: CBC Visit Type
      normalized_meaning: Visit type for the CBC form (Index case baseline, Household contact co-prevalent TB case, Household contact incident TB case, Household contact control).
      search_terms:
        - CBC_VISIT
        - Visit type
        - Index case baseline
        - Household contact co-prevalent TB case
        - Household contact incident TB case
        - Household contact control
        - cohort
      catalog_tier: dataset_backed
      analysis_queryable: true
    CBC_HBAND:
      display_label: HbA1C Not Done (Section A)
      normalized_meaning: Indicator that the diabetes-related lab (HbA1C) was not done; selecting this skips Section A and goes to Section B.
      search_terms:
        - CBC_HBAND
        - Not Done (Go to Section B)
        - HbA1C not done
        - diabetes lab not done
      catalog_tier: dataset_backed
      analysis_queryable: true
    CBC_HBADAT:
      display_label: HbA1C Processing Date
      normalized_meaning: Date the HbA1C test was processed (Day/Month/Year), jittered for PHI handling.
      search_terms:
        - CBC_HBADAT
        - Date HbA1C processed
        - HbA1C date
      catalog_tier: dataset_backed
      analysis_queryable: true
    CBC_HGAPCT:
      display_label: HbA1C (%)
      normalized_meaning: HbA1C result expressed as a percentage (one decimal place).
      search_terms:
        - CBC_HGAPCT
        - HbA1C
        - HbA1C percent
        - "HbA1C %"
        - glycated hemoglobin
      catalog_tier: dataset_backed
      analysis_queryable: true
    CBC_HGAPROP:
      display_label: HbA1C (mmol/mol)
      normalized_meaning: HbA1C result expressed in mmol/mol (alternate unit for HbA1C).
      search_terms:
        - CBC_HGAPROP
        - HbA1C mmol/mol
        - HbA1C IFCC
        - glycated hemoglobin mmol/mol
      catalog_tier: dataset_backed
      analysis_queryable: true
    CBC_HEMND:
      display_label: CBC Not Done (Section B)
      normalized_meaning: Indicator that the complete blood count (CBC) was not done.
      search_terms:
        - CBC_HEMND
        - Not Done
        - CBC not done
        - hematology not done
      catalog_tier: dataset_backed
      analysis_queryable: true
    CBC_HEMDAT:
      display_label: CBC Processing Date
      normalized_meaning: Date the CBC was processed (Day/Month/Year), jittered for PHI handling.
      search_terms:
        - CBC_HEMDAT
        - Date CBC processed
        - CBC date
        - hematology date
      catalog_tier: dataset_backed
      analysis_queryable: true
    CBC_WBC:
      display_label: White Blood Cell Count
      normalized_meaning: White Blood cell count (WBC) in cmm (cells per cubic millimeter).
      search_terms:
        - CBC_WBC
        - White Blood cell count
        - WBC
        - leukocytes
      catalog_tier: dataset_backed
      analysis_queryable: true
    CBC_RBC:
      display_label: Red Blood Cell Count
      normalized_meaning: Red Blood Cell count in mill/cumm (millions per cubic millimeter).
      search_terms:
        - CBC_RBC
        - Red Blood Cell count
        - RBC
        - erythrocytes
      catalog_tier: dataset_backed
      analysis_queryable: true
    CBC_HGB:
      display_label: Hemoglobin
      normalized_meaning: Hemoglobin concentration in gm% (g/dL).
      search_terms:
        - CBC_HGB
        - Hemoglobin
        - Hb
        - HGB
        - "gm%"
      catalog_tier: dataset_backed
      analysis_queryable: true
    CBC_HCT:
      display_label: Hematocrit
      normalized_meaning: Hematocrit (packed cell volume) as a percentage.
      search_terms:
        - CBC_HCT
        - Hematocrit
        - HCT
        - PCV
      catalog_tier: dataset_backed
