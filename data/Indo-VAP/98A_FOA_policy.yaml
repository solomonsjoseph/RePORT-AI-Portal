pdf_sections:
  participant_header:
    section_label: null
    fields:
      - SUBJID
      - FOA_VISDAT
      - FOA_VISIT
    visible_text: |
      Indo-US VAP Biomarkers for Risk of Tuberculosis and for Tuberculosis Treatment Failure and Relapse
      FINAL OUTCOME DETERMINATION FORM - COHORT A (ACTIVE PULMONARY TB)
      Index case ID:
      - -1 0 2 0 A
      Date of evaluation:
      Day                       Month                    Year
      Visit Type: 6 MO Post-TX TB Relapse/Failure/Withdrawal
      Instructions:  Document the outcome status at the participant's final visit (i.e. 6 MO Post-TX visit or TB Relapse/Failure/Withdrawal)
      All participants must be assigned 1 outcome as defined in the Common Protocol, Outcome Measures for Cohort A section.
  foa_fields:
    section_label: null
    fields:
      - FOA_RNTCPCOMP
      - FOA_RNTCDCSP
      - FOA_COHAOUT
      - FOA_COHALOC
      - FOA_COHALOCSP
    visible_text: |
      1. Did the participant successfully complete the RNTCP-specified treatment regimen?
      Yes
      No, defaulted (defined as treatment interruption for two or more consecutive months)
      No, specify reason:
      Unknown
      2. TB Outcome Status
      (Check only one)
      Bacteriologic cure
      Bacteriologic status indeterminate (For participants <14 yrs of age who did not have bacteriologic documentation at baseline)
      Bacteriologic failure
      Bacteriologic relapse
      Clinical response
      Clinical Failure
      Clinical Relapse
      Not Tuberculosis
      Death (Check only if died and none of the other outcomes apply)
      Treatment Incomplete
      Lost to follow up
      3. If the participant had bacteriologic or clinical relapse or failure, indicate the site:
      Pulmonary
      Pleural
      Lymph node
      Peritoneal
      Bone
      Joint
      Central Nervous System
      Other, specify:
  completion:
    section_label: null
    fields:
      - FOA_SIGN
      - FOA_INIT
      - FOA_COMPDAT
    visible_text: |
      Signature:
      Initials:
      Date Completed: / /
      Day                       Month                    Year
  system_metadata:
    section_label: null
    fields:
      - Time_Stamp
    visible_text: |
      (No PDF visible text — column derived from dataset capture timestamp.)
