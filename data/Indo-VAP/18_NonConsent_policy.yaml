catalog_refs:
  by_variable:
    NC_SUBJID:
      display_label: Participant ID
      normalized_meaning: Pseudonymized identifier for the candidate who was approached but did not consent.
      search_terms:
        - NC_SUBJID
        - Participant ID Number
        - Particiant ID Number
        - participant id
        - subject id
      catalog_tier: dataset_backed
      analysis_queryable: true
    NC_FID:
      display_label: Family ID
      normalized_meaning: Pseudonymized family/household identifier linking the candidate to a family unit.
      search_terms:
        - NC_FID
        - Family ID
        - family identifier
        - household id
      catalog_tier: dataset_backed
      analysis_queryable: true
    NC_VISDAT:
      display_label: Date of Screening
      normalized_meaning: Date the candidate was approached / screening visit occurred (Day/Month/Year), jittered for PHI handling.
      search_terms:
        - NC_VISDAT
        - Date of Screening
        - screening date
        - visit date
      catalog_tier: dataset_backed
      analysis_queryable: true
    NC_AGE:
      display_label: Age Category
      normalized_meaning: Categorical age bucket of the candidate (Less than 18 years, At least 18 years, or Unknown).
      search_terms:
        - NC_AGE
        - Age
        - age category
        - Less than 18 years
        - At least 18 years
      catalog_tier: dataset_backed
      analysis_queryable: true
    NC_SEX:
      display_label: Gender
      normalized_meaning: Gender of the candidate as captured on the form (Female or Male).
      search_terms:
        - NC_SEX
        - Gender
        - sex
        - Female
        - Male
      catalog_tier: dataset_backed
      analysis_queryable: true
    NC_REASON:
      display_label: Non-Consent Reason
      normalized_meaning: Reason(s) the participant declined to consent; multi-select from a fixed list with an Other/specify option.
      search_terms:
        - NC_REASON
        - non-consent reason
        - declined to consent
        - reason for non-consent
        - CHECK ALL THAT APPLY
      catalog_tier: dataset_backed
      analysis_queryable: true
    NC_REASONSP:
      display_label: Non-Consent Reason — Other Specify
      normalized_meaning: Free-text reason captured when "Other, specify" is selected for non-consent.
      search_terms:
        - NC_REASONSP
        - Other, specify
        - non-consent other reason
        - reason specify
      catalog_tier: dataset_backed
      analysis_queryable: false
    NC_SIGN:
      display_label: Data Collector Signature
      normalized_meaning: Signature of the data collector (PHI — dropped from PHI-handled dataset).
      search_terms:
        - NC_SIGN
        - Signature
        - data collector signature
      catalog_tier: source_only
      analysis_queryable: false
    NC_INIT:
      display_label: Data Collector Initials
      normalized_meaning: Initials of the data collector (PHI — dropped from PHI-handled dataset).
      search_terms:
        - NC_INIT
        - Initials
        - data collector initials
      catalog_tier: source_only
      analysis_queryable: false
    NC_COMPDAT:
      display_label: Form Completion Date
      normalized_meaning: Date the non-consent form was completed (Day/Month/Year), jittered for PHI handling.
      search_terms:
        - NC_COMPDAT
        - Date Completed
        - form completion date
      catalog_tier: dataset_backed
      analysis_queryable: true
    Time_Stamp:
      display_label: Capture Timestamp
      normalized_meaning: System-generated capture timestamp from the dataset; not part of clinical/study content.
      search_terms:
        - Time_Stamp
        - timestamp
        - capture timestamp
      catalog_tier: source_only
      analysis_queryable: false
