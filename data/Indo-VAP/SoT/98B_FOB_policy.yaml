      - FOB_VISDAT
      - FOB_VIST
    visible_text: |
      Household contact ID:
      1 0 2 0 B - -
      Date of evaluation:
      / /
      Day                       Month                    Year
      Visit Type: Month 24 TB Activation Unscheduled
  instructions:
    section_label: null
    fields: []
    visible_text: |
      Instructions: Document the outcome status at the participant's final visit (i.e. Month 24 or TB Activation visit. If the participant's final visit is at any other time, check the "unscheduled" box.)
      All participants must be assigned 1 outcome as defined in the Common Protocol, Outcome Measures for Cohort B section. Note that the "Unknown" box should only be checked if it was not possible to assess the participant's status (e.g. due to loss to follow-up, death).
  final_outcome:
    section_label: 1. Final Outcome Status
    fields:
      - FOB_COHBOUT
      - FOB_COHBOUTSP
    visible_text: |
      1. Final Outcome Status
      No TB (End of form)
      Definite Case
      Probable Case
      Possible Case
      Unknown, specify: (End of form)
  tb_site:
    section_label: "2. If participant has possible, probable, or definite TB, indicate the site:"
    fields:
      - FOB_COHBLOC
      - FOB_COHBLOCSP
    visible_text: |
      2. If participant has possible, probable, or definite TB, indicate the site:
      Pulmonary
      Pleural
      Lymph node
      Peritoneal
      Bone
      Joint
      Central Nervous System
      Other, specify: (End of form)
