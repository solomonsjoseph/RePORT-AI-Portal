catalog_refs:
  by_variable:
    SUBJID:
      display_label: Participant ID (Index Case)
      normalized_meaning: Pseudonymized identifier for the index-case study participant captured at the top of the Off Study form.
      search_terms:
        - SUBJID
        - Index case ID Number
        - participant id
        - subject id
      catalog_tier: dataset_backed
      analysis_queryable: true
    FID:
      display_label: Family ID
      normalized_meaning: Pseudonymized family/household identifier linking the index case to the household cluster.
      search_terms:
        - FID
        - Family ID Number
        - family id
        - household id
      catalog_tier: dataset_backed
      analysis_queryable: true
    FA_VISDAT:
      display_label: Date of Evaluation
      normalized_meaning: Date of the off-study evaluation (Day/Month/Year), jittered for PHI handling.
      search_terms:
        - FA_VISDAT
        - Date of evaluation
        - evaluation date
        - off study date
      catalog_tier: dataset_backed
      analysis_queryable: true
    FA_VISIT:
      display_label: Visit Type
      normalized_meaning: Visit type for the off-study form (Month 12 6-MO Post-Treatment, or Month 5 TB Relapse/Failure/Withdrawal).
      search_terms:
        - FA_VISIT
        - Visit Type
        - Month 12
        - Month 5
        - 6-MO Post-Treatment
        - TB Relapse/Failure/Withdrawal
      catalog_tier: dataset_backed
      analysis_queryable: true
    FA_FUCOMPA:
      display_label: Completed 6-MO Post-Treatment Follow-up
      normalized_meaning: Whether the participant completed follow up through the 6-MO Post-Treatment Visit (Yes/No).
      search_terms:
        - FA_FUCOMPA
        - complete follow up
        - 6-MO Post-Treatment Visit
        - follow up completion
      catalog_tier: dataset_backed
      analysis_queryable: true
    FA_FUCOMPADC:
      display_label: Reason for Not Completing Follow-up
      normalized_meaning: Reason for not completing follow-up through the 6-MO Post-Treatment Visit (single-select from the form's Q2 reason list).
      search_terms:
        - FA_FUCOMPADC
        - Reason for NOT completing follow-up
        - discontinuation reason
        - withdrawal reason
        - lost to follow up
        - treatment failure
        - TB relapse
      catalog_tier: dataset_backed
      analysis_queryable: true
    FA_FUCOMPADCSP:
      display_label: Reason for Not Completing Follow-up — Other, Specify
      normalized_meaning: Free-text "Other, specify" entry captured when the Q2 reason for not completing follow-up is "Other".
      search_terms:
        - FA_FUCOMPADCSP
        - Other, specify
        - Q2 other reason
      catalog_tier: dataset_backed
      analysis_queryable: false
    SUBJID2:
      display_label: Participant ID (Page 2 Repeat)
      normalized_meaning: Page-2 repeat of the Index case ID Number used for cross-page linkage; pseudonymized in PHI handling and de-duplicated against SUBJID.
      search_terms:
        - SUBJID2
        - Index case ID number
