      Date of evaluation:
      Day                       Month                    Year
      Visit Type:
      Month 12 (6-MO Post-Treatment)
      Month 5 (TB Relapse/Failure/Withdrawal)
  followup_completion:
    section_label: null
    fields:
      - FA_FUCOMPA
      - FA_FUCOMPADC
      - FA_FUCOMPADCSP
      - FA_WITHDRAWEXPLAIN
    visible_text: |
      1. Did the participant complete follow up through the 6-MO Post-Treatment Visit?
      Yes
      No
      Skip to the end of the form. Sign, date and initial.
      Go to Q2.
      2. Reason for NOT completing follow-up through the 6-MO Post-Treatment Visit (check ONE reason only):
      Participant was provisionally enrolled but not confirmed to have active pulmonary TB
      Go to Q3.
      Death
      Go to Q4.
      TB Relapse (declared cured or treatment completed at the end of most recent course of treatment, followed by culture confirmed or clinically diagnosed TB)
      Go to Q5.
      Treatment failure (declared sputum culture postive at month 5)
      Inadvertent enrollment
      Withdrawal by participant
      Withdrawal by parent/guardian
      Lost to follow up
      Study terminated by sponsor
      Physician decision (Investigator determines that further participation would be detrimental to the health or well-being of the subject)
      Moved out of area
      Other, specify:
      Skip to the end of the form. Sign, date and initial.
  alternative_diagnosis:
    section_label: null
    fields:
      - FA_TBALTDIAG
      - FA_TBALTDIAGSP
    visible_text: |
      Only respond to Q3 if the participant was provisionally enrolled but not confirmed to have active pulmonary TB.
      3. Provide an alternative diagnosis for participants who were not confirmed to have active TB:
      Pneumonia, not otherwise specified
      Non-tuberculosis mycobacteria (NTM)
      Lung cancer
      Viral upper respiratory infection
      Malaria
      Asthma
      Chronic Obstructive Pulmonary Disease (COPD)
      Unknown
      Other, specify:
  death_details:
