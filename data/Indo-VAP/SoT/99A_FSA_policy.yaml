      Indo-US VAP Biomarkers for Risk of Tuberculosis and for Tuberculosis Treatment Failure and Relapse
      Form F99A
      OFF STUDY FORM FOR COHORT A
      This questionnaire should be completed for all Index Cases enrolled in the study. The purpose is to determine their final status.
      Index case ID Number:
      Family ID Number:
      Index case ID number:
  visit_information:
    section_label: null
    fields:
      - FA_VISDAT
      - FA_VISIT
