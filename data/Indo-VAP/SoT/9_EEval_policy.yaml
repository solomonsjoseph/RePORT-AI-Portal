    visible_text: |
      HOUSEHOLD STRUCTURE
      Now I will ask you some about how your home is set-up.
      6. Are there doors or windows that directly connect this to another home?
      Yes (Go to 6a)
      No
      6a. Number of doors:
      Number of windows:
      7. How many exterior windows are there on the outside of your home?
      If there are no exterior windows, skip to question 8. Otherwise answer questions 7a and 7b.
      7a. How many windows in this household are usually opened to the air each day:
      7b. What types of window(s) are in this household (Check all that apply. Observe or ask.):
      Windows with cement lattice
      Windows with glass
      Windows with wood
      Windows with no glass or wooden frame
      8. How many doors are there that go to the outside of your home?
      9. How many of these doors are usually left open during the day?
      10. How many rooms in your household are only for people, not animals to live in?
