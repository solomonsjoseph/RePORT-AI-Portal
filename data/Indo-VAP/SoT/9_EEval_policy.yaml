pdf_visible_text:
  by_page:
    - page: 1
      blocks:
        - type: heading
          text: ENVIRONMENTAL EVALUATION
          related_variables: []
        - type: instruction
          text: This questionnaire must be completed once for each household where household contacts have been enrolled into the study. The purpose of this evaluation is to describe the household environment in which transmission of TB is likely to have occurred. These questions should be answered by the most knowledgeable household member.
          related_variables: []
        - type: question
          text: "Index case ID:"
          related_variables:
            - SUBJID
        - type: question
          text: "Family ID:"
          related_variables:
            - FID
        - type: question
          text: "Date of evaluation:"
          related_variables:
            - EE_VISDAT
        - type: caption
          text: "Day                       Month                    Year"
          related_variables:
            - EE_VISDAT
        - type: instruction
          text: "I need to ask some questions about your household: what it is made of, cooking and other such questions. Who could best answer these questions? Can you get him/her? (If not available, start questionnaire)"
          related_variables: []
        - type: section_label
          text: HOUSEHOLD MEMBER COMPOSITION
          related_variables:
            - EE_TOTHHC
            - EE_NUMHHC
            - EE_NEWRES
            - EE_LEFTHSE
            - EE_DIED
            - EE_NUMDIED
            - EE_DIEDTB
        - type: instruction
          text: I will start by asking you some questions about the number of people who live here.
          related_variables: []
        - type: question
          text: 1. How many people, in total, have lived in this household for most of the time during the past 3 months?
          related_variables:
            - EE_TOTHHC
        - type: question
          text: 2. Does the number of people living in this household correspond to the number on the Index Case Screening Form?
          related_variables:
            - EE_NUMHHC
        - type: option_block
          text: |
            Yes
            No (Inform Study Coord.)
          related_variables:
            - EE_NUMHHC
        - type: question
          text: 3. How many people are new residents in this household in the past 3 months?
          related_variables:
            - EE_NEWRES
        - type: question
          text: 4. How many people have left the household in the past 3 months?
          related_variables:
            - EE_LEFTHSE
        - type: question
          text: 5. Did any members of this household die in the past 12 months?
          related_variables:
            - EE_DIED
        - type: option_block
          text: |
            Yes (Go to 5a-b)
            No
          related_variables:
            - EE_DIED
        - type: instruction
          text: I am so sorry to hear that.
          related_variables:
            - EE_NUMDIED
            - EE_DIEDTB
        - type: question
          text: 5a. How many members of this household died during the past 12 months?
          related_variables:
            - EE_NUMDIED
        - type: question
          text: 5b. Did they die from tuberculosis-related problems?
          related_variables:
            - EE_DIEDTB
        - type: option_block
          text: |
            Yes
            No
            Unknown
          related_variables:
            - EE_DIEDTB
        - type: section_label
          text: HOUSEHOLD STRUCTURE
          related_variables:
            - EE_AIRFLOW
            - EE_DOORS
            - EE_WINDOWS
            - EE_EXWND
            - EE_OPENWND
            - EE_WNDTYP
            - EE_EXDOOR
            - EE_OPENDOOR
            - EE_ROOMS
        - type: instruction
          text: Now I will ask you some about how your home is set-up.
          related_variables: []
        - type: question
          text: 6. Are there doors or windows that directly connect this to another home?
          related_variables:
            - EE_AIRFLOW
        - type: option_block
          text: |
            Yes (Go to 6a)
            No
          related_variables:
            - EE_AIRFLOW
        - type: question
          text: "6a. Number of doors:"
          related_variables:
            - EE_DOORS
        - type: question
          text: "Number of windows:"
          related_variables:
            - EE_WINDOWS
        - type: question
          text: 7. How many exterior windows are there on the outside of your home?
          related_variables:
            - EE_EXWND
        - type: instruction
          text: If there are no exterior windows, skip to question 8. Otherwise answer questions 7a and 7b.
          related_variables:
            - EE_EXWND
            - EE_OPENWND
            - EE_WNDTYP
        - type: question
          text: "7a. How many windows in this household are usually opened to the air each day:"
          related_variables:
            - EE_OPENWND
        - type: question
          text: "7b. What types of window(s) are in this household (Check all that apply. Observe or ask.):"
          related_variables:
            - EE_WNDTYP
        - type: option_block
          text: |
            Windows with cement lattice
            Windows with glass
            Windows with wood
            Windows with no glass or wooden frame
          related_variables:
            - EE_WNDTYP
        - type: question
          text: 8. How many doors are there that go to the outside of your home?
          related_variables:
            - EE_EXDOOR
        - type: question
          text: 9. How many of these doors are usually left open during the day?
          related_variables:
            - EE_OPENDOOR
        - type: question
          text: 10. How many rooms in your household are only for people, not animals to live in?
          related_variables:
            - EE_ROOMS
