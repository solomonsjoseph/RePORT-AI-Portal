    visible_text: |
      HOUSEHOLD MEMBER COMPOSITION
      I will start by asking you some questions about the number of people who live here.
      1. How many people, in total, have lived in this household for most of the time during the past 3 months?
      2. Does the number of people living in this household correspond to the number on the Index Case Screening Form?
      Yes
      No (Inform Study Coord.)
      3. How many people are new residents in this household in the past 3 months?
      4. How many people have left the household in the past 3 months?
      5. Did any members of this household die in the past 12 months?
      Yes (Go to 5a-b)
      No
      I am so sorry to hear that.
      5a. How many members of this household died during the past 12 months?
      5b. Did they die from tuberculosis-related problems?
      Yes
      No
      Unknown
  household_structure:
    section_label: HOUSEHOLD STRUCTURE
    fields:
