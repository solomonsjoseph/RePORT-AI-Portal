catalog_refs:
  by_variable:
    SUBJID:
      display_label: Index Case ID
      normalized_meaning: Pseudonymized identifier for the index case (subject) at this household.
      search_terms:
        - SUBJID
        - Index case ID
        - index case
        - subject id
      catalog_tier: dataset_backed
      analysis_queryable: true
    FID:
      display_label: Family ID
      normalized_meaning: Pseudonymized identifier for the family/household.
      search_terms:
        - FID
        - Family ID
        - family identifier
        - household id
      catalog_tier: dataset_backed
      analysis_queryable: true
    EE_VISDAT:
      display_label: Date of Evaluation
      normalized_meaning: Date the environmental evaluation visit was performed (Day/Month/Year), jittered for PHI handling.
      search_terms:
        - EE_VISDAT
        - Date of evaluation
        - visit date
      catalog_tier: dataset_backed
      analysis_queryable: true
    EE_TOTHHC:
      display_label: Total Household Members (past 3 months)
      normalized_meaning: Total number of people who have lived in the household for most of the time during the past 3 months.
      search_terms:
        - EE_TOTHHC
        - total household
        - household members count
      catalog_tier: dataset_backed
      analysis_queryable: true
    EE_NUMHHC:
      display_label: Household Size Matches Index Case Screening
      normalized_meaning: Whether the number of people living in this household matches the number on the Index Case Screening Form.
