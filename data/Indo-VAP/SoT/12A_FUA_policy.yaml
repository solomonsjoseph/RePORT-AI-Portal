        - FUA_FATIGUE
        - Fatigue
      catalog_tier: dataset_backed
      analysis_queryable: true
    FUA_TXCOMP:
      display_label: Last Time TB Medications Missed
      normalized_meaning: When the participant last missed taking any TB medications (six time-window options).
      search_terms:
