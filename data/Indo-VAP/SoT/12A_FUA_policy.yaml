catalog_refs:
  by_variable:
    SUBJID:
      display_label: Index Case ID (Page 1)
      normalized_meaning: Pseudonymized index-case participant identifier captured on page 1 of the follow-up visit form.
      search_terms:
        - SUBJID
        - Index case ID
        - participant id
        - subject id
      catalog_tier: dataset_backed
      analysis_queryable: true
    FUA_VISDAT:
      display_label: Date of Evaluation
      normalized_meaning: Date the follow-up evaluation was performed (Day/Month/Year), jittered for PHI handling.
      search_terms:
        - FUA_VISDAT
        - Date of evaluation
        - visit date
        - evaluation date
      catalog_tier: dataset_backed
      analysis_queryable: true
    FUA_CNTC:
      display_label: Could Not Contact or Evaluate
      normalized_meaning: Indicator that the participant could not be contacted or evaluated for this follow-up visit.
      search_terms:
        - FUA_CNTC
        - Could not contact or evaluate
        - contact failure
      catalog_tier: dataset_backed
      analysis_queryable: true
    FUA_CNTCNDSP:
      display_label: Could Not Contact — Reason (Specify)
      normalized_meaning: Free-text reason captured when the participant could not be contacted or evaluated.
      search_terms:
        - FUA_CNTCNDSP
        - specify reason
        - reason for no contact
      catalog_tier: dataset_backed
      analysis_queryable: false
    FUA_CNTCHOW:
      display_label: How Visit Was Conducted
      normalized_meaning: How the follow-up visit was conducted (In person, By phone, or Other specify).
      search_terms:
        - FUA_CNTCHOW
        - This visit was conducted
        - In person
        - By phone
        - mode of contact
      catalog_tier: dataset_backed
      analysis_queryable: true
    FUA_CNTCHOWSP:
      display_label: How Visit Conducted — Other (Specify)
      normalized_meaning: Free-text other-specify capturing the alternate visit-conduct mode when "Other, specify:" is selected.
      search_terms:
        - FUA_CNTCHOWSP
        - Other, specify
        - other mode of contact
      catalog_tier: dataset_backed
      analysis_queryable: false
    FUA_VISIT:
      display_label: Visit Type
      normalized_meaning: Visit-type indicator (Month 1, Month 2, Month 6, Month 7, 6-mo post-tx (M12), TB Failure/Relapse/Withdrawal).
      search_terms:
        - FUA_VISIT
        - Visit type
        - Month 1
        - Month 2
        - Month 6
        - Month 7
        - 6-mo post-tx
        - TB Failure/Relapse/Withdrawal
        - visit
      catalog_tier: dataset_backed
      analysis_queryable: true
    FUA_SSCHG:
      display_label: Signs/Symptoms Change Since Last Visit
      normalized_meaning: Self-reported feeling change since the last study visit (Improved with/without symptoms, Worsened, No change).
      search_terms:
        - FUA_SSCHG
        - feeling compared to when I saw you last
        - signs/symptoms change
        - improved
        - worsened
        - no change
      catalog_tier: dataset_backed
      analysis_queryable: true
    FUA_COUGH:
      display_label: Cough Since Last Visit
      normalized_meaning: Whether the participant has had cough since the last study visit (Yes/No).
      search_terms:
        - FUA_COUGH
        - Cough
        - cough symptom
      catalog_tier: dataset_backed
      analysis_queryable: true
    FUA_COUGHDUR:
      display_label: Cough Duration (Weeks)
      normalized_meaning: Duration of cough in weeks (child of FUA_COUGH).
      search_terms:
        - FUA_COUGHDUR
        - Duration
        - cough duration
        - weeks
      catalog_tier: dataset_backed
      analysis_queryable: true
    FUA_COUGHBLD:
      display_label: Coughing Up Blood
      normalized_meaning: Whether the participant has been coughing up blood since the last study visit (Yes/No).
      search_terms:
        - FUA_COUGHBLD
        - Coughing up blood
        - hemoptysis
      catalog_tier: dataset_backed
      analysis_queryable: true
    FUA_FEVER:
      display_label: Fever Since Last Visit
      normalized_meaning: Whether the participant has had fever since the last study visit (Yes/No/Unknown).
      search_terms:
        - FUA_FEVER
        - Fever
      catalog_tier: dataset_backed
      analysis_queryable: true
    FUA_NIGHTSWT:
      display_label: Excessive Night Sweats
      normalized_meaning: Whether the participant has had excessive night sweats since the last study visit (Yes/No/Unknown).
      search_terms:
        - FUA_NIGHTSWT
        - Excessive night sweats
        - night sweats
      catalog_tier: dataset_backed
      analysis_queryable: true
    FUA_WTLOSS:
      display_label: Unexpected Weight Loss
      normalized_meaning: Whether the participant has had unexpected weight loss since the last study visit (Yes/No/Unknown).
      search_terms:
        - FUA_WTLOSS
        - Unexpected weight loss
        - weight loss
      catalog_tier: dataset_backed
      analysis_queryable: true
    FUA_FAILTHRV:
      display_label: Appetite Loss or Failure to Thrive
      normalized_meaning: Whether the participant has loss of appetite (adult) or failure to gain weight (child) since the last study visit (Yes/No/Unknown).
      search_terms:
        - FUA_FAILTHRV
        - Loss of appetite
        - failure to gain weight
        - failure to thrive
      catalog_tier: dataset_backed
      analysis_queryable: true
    FUA_CHSTPAIN:
      display_label: Chest Pain
      normalized_meaning: Whether the participant has chest pain especially with coughing or taking a deep breath since the last study visit (Yes/No/Unknown).
      search_terms:
        - FUA_CHSTPAIN
        - Chest pain
      catalog_tier: dataset_backed
      analysis_queryable: true
    FUA_FATIGUE:
      display_label: Fatigue
      normalized_meaning: Whether the participant has had fatigue since the last study visit (Yes/No/Unknown).
