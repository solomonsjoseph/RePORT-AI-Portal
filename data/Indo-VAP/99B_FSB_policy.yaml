catalog_refs:
  by_variable:
    SUBJID:
      display_label: Participant ID
      normalized_meaning: Pseudonymized identifier for the household contact participant (Cohort B).
      search_terms:
        - SUBJID
        - Household contact ID
        - participant id
        - subject id
      catalog_tier: dataset_backed
      analysis_queryable: true
    FB_VISDAT:
      display_label: Off-Study Visit Date
      normalized_meaning: Date of the off-study evaluation visit (Day/Month/Year), jittered for PHI handling.
      search_terms:
        - FB_VISDAT
        - Date of evaluation
        - off-study visit date
        - final status visit date
      catalog_tier: dataset_backed
      analysis_queryable: true
    FID:
      display_label: Family ID
      normalized_meaning: Pseudonymized household/family identifier linking related contacts.
      search_terms:
        - FID
        - Family ID
        - household ID
        - family identifier
      catalog_tier: dataset_backed
      analysis_queryable: true
    FB_VISIT:
      display_label: Visit Type
      normalized_meaning: Off-study visit type (Month 12, Month 24, TB Activation, or Unscheduled).
      search_terms:
        - FB_VISIT
        - Visit type
        - Month 12
        - Month 24
        - TB Activation
        - Unscheduled
      catalog_tier: dataset_backed
      analysis_queryable: true
    FB_FUCOMPB:
      display_label: Completed Follow-up Through Month 24
      normalized_meaning: Whether the participant completed follow up through the month 24 visit (Yes/No).
      search_terms:
        - FB_FUCOMPB
        - completed follow up
        - completed month 24 visit
        - follow-up complete
      catalog_tier: dataset_backed
      analysis_queryable: true
    FB_FUCOMPBDC:
      display_label: Reason Not Completed Follow-up
      normalized_meaning: Reason the participant did not complete follow up through month 24 (single select among active TB, death, physician decision, inadvertent enrollment, withdrawal by participant, withdrawal by parent/guardian, lost to follow up, moved out of area, study terminated by sponsor, other specify).
      search_terms:
        - FB_FUCOMPBDC
        - reason for not completing follow up
        - discontinuation reason
        - off-study reason
      catalog_tier: dataset_backed
      analysis_queryable: true
    FB_FUCOMPBDCSP:
      display_label: Reason Not Completed — Other Specify
      normalized_meaning: Free-text "Other, specify" reason captured when FB_FUCOMPBDC = "Other, specify".
      search_terms:
        - FB_FUCOMPBDCSP
        - Other, specify
        - other reason for not completing follow up
      catalog_tier: dataset_backed
      analysis_queryable: false
    FB_ENRCOHA:
      display_label: Enrolled into Cohort A
      normalized_meaning: Whether the participant who developed active TB has been enrolled into Cohort A (Yes/No).
      search_terms:
        - FB_ENRCOHA
        - enrolled into Cohort A
        - Cohort A enrollment
        - active TB cohort transfer
      catalog_tier: dataset_backed
      analysis_queryable: true
    FB_ENRCOHASP:
      display_label: Active TB Type / Specify Reason
      normalized_meaning: TB classification recorded under Q3a "Specify reason" — Extrapulmonary TB (no pulmonary disease), MDR-TB, XDR-TB, or Other (multiple responses possible).
      search_terms:
        - FB_ENRCOHASP
        - Specify reason
        - Extrapulmonary TB
        - EPTB
        - MDR-TB
        - XDR-TB
        - active TB type
      catalog_tier: dataset_backed
