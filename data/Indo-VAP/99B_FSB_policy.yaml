      catalog_tier: dataset_backed
      analysis_queryable: true
    FB_DTHSRC:
      display_label: Death Information Source
      normalized_meaning: Source from which death information was obtained — death certificate, autopsy report, medical record, contact with family/friends, contact with physician/social worker, or other (multiple responses possible).
