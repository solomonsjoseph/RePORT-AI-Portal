    section_label: null
    fields:
      - SUBJID
      - FB_VISDAT
      - FID
      - FB_VISIT
    visible_text: |
      OFF STUDY FORM FOR COHORT B
      This questionnaire should be completed for all enrolled Household Contacts.  The purpose is to determine their final status.
      Household contact ID:
      Date of evaluation:
      Day                        Month                   Year
      Family ID:
      Visit type: Month 12 Month 24 TB Activation Unscheduled
  followup_status:
    section_label: null
    fields:
      - FB_FUCOMPB
      - FB_FUCOMPBDC
      - FB_FUCOMPBDCSP
    visible_text: |
      1. Did the participant complete follow up through the month 24 visit?
      Yes
      Skip to the end of the form.
      Sign, date and initial.
      No
      2. Reason for NOT completing follow up through the month 24 visit? (check ONE reason only:)
      Participant developed active TB
      (Go to Q3)
      Death
      (Go to Q4)
      Physician decision (Investigator determines that further participation would be detrimental to the health or well-being of the subject)
      Inadvertent enrollment
      Withdrawal by participant
      Withdrawal by parent/guardian
      Lost to follow up
      Moved out of area
      Study terminated by sponsor
      Other, specify:
      (End of form)
  cohort_a_enrollment:
    section_label: null
    fields:
      - FB_ENRCOHA
      - FB_ENRCOHASP
      - FB_ENRCOHASPO
    visible_text: |
      3. If the participant developed active TB, has the participant been enrolled into Cohort A?
      Yes
      No
      3a. Specify reason:
      Extrapulmonary TB (no pulmonary disease)
      MDR-TB
      XDR-TB
      Other, specify:
      (Multiple responses possible):
  death_details:
    section_label: null
    fields:
      - FB_DTHCAUSSP
      - FB_DTHDAT
      - FB_DTHSRC
      - FB_DTHSRCSP
    visible_text: |
      Only respond to Q4 if the participant died while on study.
      4a. Primary cause of death:
      4b. Date of death:
      /          /
      Day                       Month                    Year
      4c. Death information obtained from
      (Multiple responses possible):
      Death certificate
      Autopsy report
      Medical record
      Contact with participant's family or friends
      Contact wtih physician/social worker
      Other, specify
  withdrawal_explanation:
    section_label: null
    fields:
      - FB_WITHDRAWEXPLAIN
    visible_text: |
      (No exact PDF question label observed; column appears to capture free-text explanation associated with the withdrawal options under Q2 "Withdrawal by participant" / "Withdrawal by parent/guardian". Mapping needs human review.)
  completion:
