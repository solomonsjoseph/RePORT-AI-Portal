pdf_visible_text:
  by_page:
    - page: 1
      blocks:
        - type: heading
          text: "INDEX CASE: Clinical/Demographic Form"
          related_variables: []
        - type: instruction
          text: "This questionnaire must be completed for each Index Case as the baseline visit.  The purpose of this questionnaire is to evaluate the clinical characteristics and infectiousness of the Index TB case."
          related_variables: []
        - type: heading
          text: "Indo-US VAP Biomarkers for Risk of Tuberculosis and for Tuberculosis Treatment Failure and Relapse"
          related_variables: []
        - type: instruction
          text: "We would like to ask you some questions about your health, including information on living conditions and health facilities. This survey will take about 15 minutes. The information you provide will be used to better understand how tuberculosis affects people. Your answers will remain anonymous. Your name will not be written on the questionnaire. At any time, if there is a question that you'd rather not answer, please let me know and we can skip that question. Some of the questions may be sensitive, but please do your best to answer honestly. At this time do you want to ask me anything about the survey?   (Answer any questions and address respondent's concerns.) May I start the interview now? (Proceed if participant agrees.) We will begin with a few questions about your background. (If the participant is a child or otherwise unable to respond and the guardian is not present, say, \" You may want your parent/guardian to come help you answer questions .\")."
          related_variables: []
        - type: question
          text: "Index Case ID Number:"
          related_variables:
            - SUBJID
        - type: question
          text: "Family ID Number:"
          related_variables:
            - FID
        - type: question
          text: "PHC ID"
          related_variables:
            - PHCID
        - type: caption
          text: "(Refer to code sheet):"
          related_variables:
            - PHCID
        - type: caption
          text: "Form 2A"
          related_variables: []
        - type: question
          text: "Date of evaluation:"
          related_variables:
            - IC_VISDAT
        - type: caption
          text: "Day                       Month                    Year"
          related_variables:
            - IC_VISDAT
        - type: section_label
          text: "DEMOGRAPHIC INFORMATION"
          related_variables:
            - IC_MARISTAT
            - IC_RELIGION
            - IC_RELIGIONSP
            - IC_CASTE
            - IC_LANGUAGE
            - IC_LANGUAGESP
        - type: question
          text: "1. What is your marital status?"
          related_variables:
            - IC_MARISTAT
        - type: option_block
          text: |
            Never married
            Married/Living together
            Separate/divorced
            Widowed
            Not applicable (child)
          related_variables:
            - IC_MARISTAT
        - type: question
          text: "2. What is your religion?"
          related_variables:
            - IC_RELIGION
        - type: option_block
          text: |
            Christian
            Hindu
            Muslim
            Sikh
            Jain
            Buddhist
            Zoroastrian (Parsi)
            Not religious
            Other, specify:
            Refused to answer
            Don't know
          related_variables:
            - IC_RELIGION
            - IC_RELIGIONSP
        - type: question
          text: "3. What is the caste or tribe of the head of the household?"
          related_variables:
            - IC_CASTE
        - type: option_block
          text: |
            Scheduled caste
            Scheduled tribe
            Other backward caste
            None of them
            No caste or tribe
            Don't know
          related_variables:
            - IC_CASTE
        - type: question
          text: "4. What is your native language?"
          related_variables:
            - IC_LANGUAGE
        - type: option_block
          text: |
            Assamese
            Bengali
            English
            Gujrathi
            Hindi
            Kannada
            Kashmiri
            Konkani
            Malyalam
            Manipuri
            Marathi
            Nepali
            Oria
            Punjabi
            Sindhi
            Tamil
            Telgu
            Urdu
            Other, specify:
          related_variables:
            - IC_LANGUAGE
            - IC_LANGUAGESP
    - page: 2
      blocks:
        - type: question
          text: "5. For how many years did your mother go to school?"
          related_variables:
            - IC_MASCHOOLDU
            - IC_MASCHOOLDK
        - type: caption
          text: "years    (Enter 00 if mother did not go to school.)"
          related_variables:
            - IC_MASCHOOLDU
        - type: option_block
          text: |
            Refused to answer
            Don't know
          related_variables:
            - IC_MASCHOOLDK
        - type: question
          text: "6. For how many years did you go to school?"
          related_variables:
