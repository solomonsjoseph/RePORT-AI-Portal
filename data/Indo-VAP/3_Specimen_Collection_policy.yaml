catalog_refs:
  by_variable:
    SUBJID:
      display_label: Participant ID
      normalized_meaning: Pseudonymized identifier for the study participant.
      search_terms:
        - SUBJID
        - Participant ID number
        - participant id
        - subject id
      catalog_tier: dataset_backed
      analysis_queryable: true
    FID:
      display_label: Family ID
      normalized_meaning: Pseudonymized family/household identifier linking participants in the same household.
      search_terms:
        - FID
        - Family ID Number
        - family id
        - household id
      catalog_tier: dataset_backed
      analysis_queryable: true
    SC_BLDDAT:
      display_label: Date of Blood Draw
      normalized_meaning: Date the specimen-collection blood draw was performed (Day/Month/Year), jittered for PHI handling.
      search_terms:
        - SC_BLDDAT
        - Date of Blood Draw
        - blood draw date
      catalog_tier: dataset_backed
      analysis_queryable: true
    SC_BLDTIM:
      display_label: Time of Visit
      normalized_meaning: Time of the specimen-collection visit captured in 24-hour clock notation.
      search_terms:
        - SC_BLDTIM
        - Time of Visit
        - 24 hour clock
        - visit time
      catalog_tier: dataset_backed
      analysis_queryable: true
    SC_BLDDRW:
      display_label: Blood Draw Performed
      normalized_meaning: Whether the blood draw was performed (Yes/No).
      search_terms:
        - SC_BLDDRW
        - Was the blood draw performed
        - blood draw performed
      catalog_tier: dataset_backed
      analysis_queryable: true
    SC_NODRW:
      display_label: No Blood Draw Reason
      normalized_meaning: Reason recorded when the blood draw was not performed (Refused, Work, School, Travel, Participant otherwise unavailable, Unable to draw blood, Inadequate time, Other).
      search_terms:
