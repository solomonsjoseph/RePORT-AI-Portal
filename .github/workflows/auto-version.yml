name: Auto Version Bump

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
      - '.github/workflows/docs-quality-check.yml'

concurrency:
  group: auto-version-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version-bump:
    name: Conventional commit version bump
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      !startsWith(github.event.head_commit.message, 'chore: bump version') &&
      github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: '3.13'
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Determine version bump
        id: bump
        shell: bash
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          first_line="$(printf '%s\n' "$COMMIT_MSG" | head -n 1)"

          if printf '%s\n' "$COMMIT_MSG" | grep -qiE 'BREAKING CHANGE:' || printf '%s\n' "$first_line" | grep -qiE '^[a-z]+(\([^)]+\))?!:'; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$first_line" | grep -qiE '^feat(\([^)]+\))?:'; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$first_line" | grep -qiE '^fix(\([^)]+\))?:'; then
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          else
            echo "bump=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version files
        if: steps.bump.outputs.bump != 'none'
        id: version
        shell: python
        run: |
          import os
          import re
          from pathlib import Path

          version_file = Path("__version__.py")
          content = version_file.read_text(encoding="utf-8")
          match = re.search(r'__version__:\s*str\s*=\s*"(\d+)\.(\d+)\.(\d+)"', content)
          if not match:
              raise ValueError("Could not parse version from __version__.py")

          major, minor, patch = map(int, match.groups())
          old_version = f"{major}.{minor}.{patch}"
          bump = "${{ steps.bump.outputs.bump }}"
          if bump == "major":
              major, minor, patch = major + 1, 0, 0
          elif bump == "minor":
              minor, patch = minor + 1, 0
          elif bump == "patch":
              patch += 1

          new_version = f"{major}.{minor}.{patch}"
          version_file.write_text(
              content.replace(
                  f'__version__: str = "{old_version}"',
                  f'__version__: str = "{new_version}"',
              ),
              encoding="utf-8",
          )

          config_yaml = Path("config/config.yaml")
          if config_yaml.exists():
              yaml_content = config_yaml.read_text(encoding="utf-8")
              yaml_content = re.sub(
                  rf'^(\s+version:\s*"){re.escape(old_version)}"',
                  rf'\g<1>{new_version}"',
                  yaml_content,
                  count=1,
                  flags=re.MULTILINE,
              )
              config_yaml.write_text(yaml_content, encoding="utf-8")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"old_version={old_version}\n")
              fh.write(f"new_version={new_version}\n")

          print(f"Version bumped: {old_version} -> {new_version} ({bump})")

      - name: Commit version bump
        if: steps.bump.outputs.bump != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add __version__.py config/config.yaml
          git diff --cached --quiet && exit 0
          git commit -m "chore: bump version ${{ steps.version.outputs.old_version }} -> ${{ steps.version.outputs.new_version }}"
          git push
