name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'RePORT_India_STUDY_RAG_Focus'
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches:
      - main
      - 'RePORT_India_STUDY_RAG_Focus'
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync locked dependencies
        run: uv sync --frozen --all-groups

      - name: Run Ruff
        run: uv run --frozen ruff check .

      - name: Run mypy
        run: uv run --frozen mypy scripts/ main.py config.py --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync locked dependencies
        run: uv sync --frozen --all-groups

      - name: Run pytest
        run: uv run --frozen pytest tests/ -v --tb=short -q
