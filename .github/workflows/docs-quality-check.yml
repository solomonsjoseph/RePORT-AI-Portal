name: Documentation Quality

on:
  schedule:
    - cron: '0 9 1 1,4,7,10 *'
  workflow_dispatch:
  push:
    paths:
      - 'README.md'
      - 'docs/**'
      - 'scripts/lint_doc_freshness.py'
      - 'scripts/ai_assistant/agent_tools.py'
      - 'scripts/security/phi_scrub.yaml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/docs-quality-check.yml'
  pull_request:
    paths:
      - 'README.md'
      - 'docs/**'
      - 'scripts/lint_doc_freshness.py'
      - 'scripts/ai_assistant/agent_tools.py'
      - 'scripts/security/phi_scrub.yaml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/docs-quality-check.yml'

concurrency:
  group: docs-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_FROZEN: '1'
  PYTHONUNBUFFERED: '1'

jobs:
  docs:
    name: Freshness, strict build, and links
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: '3.13'
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Doc freshness
        run: uv run python scripts/lint_doc_freshness.py

      - name: Strict Sphinx build
        run: make docs-quality

      - name: Link check
        working-directory: docs/sphinx
        run: uv run sphinx-build -b linkcheck . _build/linkcheck

      - name: Documentation metrics
        if: always()
        shell: bash
        run: |
          echo "Documentation line count:"
          find docs/sphinx -type f -name '*.rst' -exec wc -l {} + | sort -rn | tail -n 20
          echo
          echo "Largest documentation files:"
          find docs/sphinx -type f -name '*.rst' -exec wc -l {} + | sort -rn | head -10
